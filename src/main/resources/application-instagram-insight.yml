# Instagram Insight 설정
instagram:
  insight:
    # 인사이트 조회 기간 (일 단위)
    insight-period-days: 30
    # 스케줄러 활성화 여부
    scheduler-enabled: true
    # API 호출 간격 (밀리초)
    api-call-interval-ms: 1000

# 로깅 설정 (Instagram 관련)
logging:
  level:
    com.iceAge.server.instagram_post: INFO
    com.iceAge.server.instagram_post.infrastructure.scheduler: DEBUG
