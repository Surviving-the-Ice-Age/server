spring:
  application:
    name: server
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        transaction:
          jta:
            platform: org.hibernate.service.jta.JtaPlatform
        format_sql: true
        show_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  jwt:
    secret: ${JWT_SECRET}

  security:
    oauth2:
      client:
        registration:
            google:
                client-name: Google
                client-id: ${GOOGLE_CLIENT_ID}
                client-secret: ${GOOGLE_CLIENT_SECRET}
                redirect-uri: ${SERVER_LOGIN_GOOGLE_REDIRECT_URL}
                authorization-grant-type: authorization_code
                scope:
                  - email
                  - profile

            naver:
              client-name: naver
              client-id: ${NAVER_CLIENT_ID}
              client-secret: ${NAVER_CLIENT_SECRET}
              redirect-uri: ${SERVER_LOGIN_NAVER_REDIRECT_URL}
              authorization-grant-type: authorization_code
              scope:
                - email
                - profile

        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

server:
  port: 8080

app:
  login:
    redirect:
      url: ${APP_LOGIN_REDIRECT_URL}

instagram:
  access-token: ${INSTAGRAM_ACCESS_TOKEN}
  app-id: ${INSTAGRAM_APP_ID}